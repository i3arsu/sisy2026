<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3253"/>
      <stop offset="55%" stop-color="#1a5a87"/>
      <stop offset="100%" stop-color="#2e88b3"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3a5c"/>
      <stop offset="100%" stop-color="#061d33"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2d1"/>
      <stop offset="55%" stop-color="#f6b187" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8492a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="380" fill="url(#sky)"/>
  <!-- sun -->
  <circle cx="900" cy="300" r="130" fill="url(#sun)"/>
  <circle cx="900" cy="300" r="48" fill="#fff2d1" fill-opacity="0.95"/>
  <!-- horizon -->
  <line x1="0" y1="380" x2="1200" y2="380" stroke="#b6dfe5" stroke-opacity="0.5"/>
  <!-- arena silhouette -->
  <g fill="#061d33" fill-opacity="0.75">
    <path d="M-20,380 L60,372 L160,378 L260,368 L420,376 L520,370 L640,380 L720,375 L820,380 L900,376 L1000,380 L1080,378 L1200,376 L1200,385 L-20,385 Z"/>
    <g transform="translate(440,350)">
      <path d="M0,30 L0,12 Q0,0 16,0 L96,0 Q112,0 112,12 L112,30 Z"/>
      <g fill="#faf5e6" fill-opacity="0.25">
        <rect x="8" y="14" width="5" height="12"/>
        <rect x="20" y="14" width="5" height="12"/>
        <rect x="32" y="14" width="5" height="12"/>
        <rect x="44" y="14" width="5" height="12"/>
        <rect x="56" y="14" width="5" height="12"/>
        <rect x="68" y="14" width="5" height="12"/>
        <rect x="80" y="14" width="5" height="12"/>
        <rect x="92" y="14" width="5" height="12"/>
      </g>
    </g>
  </g>
  <!-- sea -->
  <rect y="380" width="1200" height="250" fill="url(#sea)"/>
  <!-- sun reflection -->
  <g opacity="0.6">
    <ellipse cx="900" cy="395" rx="80" ry="2" fill="#fff2d1" fill-opacity="0.5"/>
    <ellipse cx="900" cy="415" rx="60" ry="2" fill="#f6b187" fill-opacity="0.45"/>
    <ellipse cx="900" cy="440" rx="45" ry="2" fill="#f6b187" fill-opacity="0.4"/>
    <ellipse cx="900" cy="475" rx="32" ry="1.5" fill="#f6b187" fill-opacity="0.35"/>
  </g>
  <!-- wave bands -->
  <g fill="none" stroke="#b6dfe5">
    <path d="M0,430 Q150,418 300,430 T600,430 T900,430 T1200,430" stroke-opacity="0.25"/>
    <path d="M0,475 Q150,460 300,475 T600,475 T900,475 T1200,475" stroke-opacity="0.32"/>
    <path d="M0,525 Q150,505 300,525 T600,525 T900,525 T1200,525" stroke-opacity="0.4"/>
    <path d="M0,580 Q150,555 300,580 T600,580 T900,580 T1200,580" stroke-opacity="0.5"/>
  </g>

  <!-- Text -->
  <g fill="#faf5e6" font-family="Georgia, 'Times New Roman', serif">
    <text x="80" y="170" font-size="36" font-weight="500" fill="#b6dfe5" font-family="Menlo, monospace" letter-spacing="6">SISY · IEEE · 24TH EDITION</text>
    <text x="80" y="290" font-size="118" font-weight="500" letter-spacing="-4">Intelligent</text>
    <text x="80" y="400" font-size="118" font-weight="500" letter-spacing="-4">Systems <tspan fill="#b6dfe5" font-style="italic">&amp;</tspan> Informatics</text>
    <text x="80" y="540" font-size="36" font-family="Menlo, monospace" letter-spacing="4" fill="#b6dfe5">23 – 25 SEP 2026 · PULA · CROATIA</text>
  </g>
</svg>
